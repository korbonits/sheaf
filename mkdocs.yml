site_name: sheaf-serve
site_description: A unified serving layer for non-text foundation models — vLLM for everything that isn't an LLM.
site_url: https://sheaf-serve.dev/
repo_url: https://github.com/korbonits/sheaf
repo_name: korbonits/sheaf
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
    - announce.dismiss
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            show_root_toc_entry: false
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            signature_crossrefs: true
            merge_init_into_class: true
            filters: ["!^_"]

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Concepts:
      - concepts/index.md
      - Batching: concepts/batching.md
      - Caching: concepts/caching.md
      - Streaming: concepts/streaming.md
      - Feast integration: concepts/feast.md
      - Offline batch jobs: concepts/batch.md
      - Async-job worker: concepts/worker.md
      - LoRA multiplexing: concepts/lora.md
  - Models:
      - models/index.md
  - Deployment:
      - deployment/index.md
      - Docker: deployment/docker.md
      - KubeRay: deployment/kuberay.md
      - Modal: deployment/modal.md
  - Client:
      - client/index.md
      - OpenAPI: client/openapi.md
  - API reference:
      - api-reference/index.md
      - Specs: api-reference/spec.md
      - API contracts: api-reference/api.md
      - Scheduling: api-reference/scheduling.md
      - Caching: api-reference/cache.md
      - LoRA: api-reference/lora.md
      - Batch runner: api-reference/batch.md
      - Worker: api-reference/worker.md
      - Client: api-reference/client.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/korbonits/sheaf
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/sheaf-serve/

