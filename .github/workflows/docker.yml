name: Publish Docker image to GHCR

# Mirrors publish.yml's trigger so a `v*` tag fires both PyPI and Docker
# publishes.  The Docker build pip-installs sheaf-serve from PyPI, so it
# waits for the just-pushed version to appear on PyPI before building.
on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # required to push to ghcr.io/korbonits/*

    steps:
      - uses: actions/checkout@v4

      # Strip the leading "v" so the version matches PyPI's bare X.Y.Z
      # form ("v0.9.0" tag → "0.9.0" version) and pin it for downstream
      # steps as ${{ env.SHEAF_VERSION }}.
      - name: Resolve sheaf-serve version from tag
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "SHEAF_VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "Building image for sheaf-serve==${VERSION}"

      # PyPI's JSON API can lag a minute or two behind a fresh upload
      # (CDN cache).  Poll until the version is queryable so the docker
      # build's pip install doesn't race the publish.yml workflow.
      - name: Wait for sheaf-serve on PyPI
        run: |
          for i in $(seq 1 30); do
            if curl -sf "https://pypi.org/pypi/sheaf-serve/${SHEAF_VERSION}/json" > /dev/null; then
              echo "sheaf-serve==${SHEAF_VERSION} is on PyPI"
              exit 0
            fi
            echo "Attempt $i/30: not yet on PyPI, sleeping 10s..."
            sleep 10
          done
          echo "::error::Timed out waiting for sheaf-serve==${SHEAF_VERSION} on PyPI"
          exit 1

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # docker/metadata-action computes the right tag set: vX.Y.Z, X.Y.Z,
      # and `latest` (only on stable, non-prerelease tags).  The image
      # name is forced to lowercase because GHCR requires lowercase repo
      # names and ${{ github.repository }} preserves the original case.
      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/sheaf-serve
          tags: |
            type=semver,pattern=v{{version}}
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ !contains(github.ref, '-') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          build-args: |
            SHEAF_VERSION=${{ env.SHEAF_VERSION }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions cache speeds up rebuilds when only docs / minor
          # things change between tags.  Scope is per-ref so different tags
          # don't evict each other.
          cache-from: type=gha
          cache-to: type=gha,mode=max
