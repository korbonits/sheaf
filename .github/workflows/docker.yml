name: Publish Docker image to GHCR

# Two trigger modes:
#
#   - tag push (`v*`)    : full publish path — wait for PyPI propagation,
#                          login to GHCR, build, and push the image.
#   - pull_request       : build-only validation when the Dockerfile or
#                          this workflow itself changes.  Catches broken
#                          Dockerfiles at PR time instead of waiting for
#                          a tag release to discover them.
#
# Path filters keep PR builds off every unrelated PR — only Dockerfile-
# adjacent changes trigger the build.
on:
  push:
    tags:
      - "v*"
  pull_request:
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/docker.yml"
  # Manual fire — useful to validate the Dockerfile builds before cutting
  # a release tag (the build artifact isn't published; push: false applies
  # to anything that isn't a `v*` tag push).
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # required to push to ghcr.io/korbonits/* on tag push

    steps:
      - uses: actions/checkout@v4

      # Two source-of-truth modes for the version baked into the image:
      #
      #   - tag push: strip the leading "v" from the tag (refs/tags/v0.10.0
      #               → 0.10.0).  This is the canonical release path.
      #   - PR:       read the version from pyproject.toml.  Whatever's
      #               currently checked in must already be on PyPI for the
      #               build to succeed (pip install sheaf-serve==X.Y.Z
      #               needs to resolve).  PRs that bump the version BEFORE
      #               that version is on PyPI will fail this build — that's
      #               by design, since the release commit hasn't landed yet.
      - name: Resolve sheaf-serve version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION=$(grep -E '^version' pyproject.toml | head -1 | cut -d'"' -f2)
          fi
          echo "SHEAF_VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building image for sheaf-serve==${VERSION}"

      # PyPI's JSON API can lag a minute or two behind a fresh upload (CDN
      # cache).  Poll until the version is queryable so the docker build's
      # pip install doesn't race the publish.yml workflow.  Skipped on PR
      # builds — the version we read from pyproject.toml is whatever is
      # currently on main (released some time ago), so it's already
      # propagated.
      - name: Wait for sheaf-serve on PyPI
        if: github.event_name == 'push'
        run: |
          for i in $(seq 1 30); do
            if curl -sf "https://pypi.org/pypi/sheaf-serve/${SHEAF_VERSION}/json" > /dev/null; then
              echo "sheaf-serve==${SHEAF_VERSION} is on PyPI"
              exit 0
            fi
            echo "Attempt $i/30: not yet on PyPI, sleeping 10s..."
            sleep 10
          done
          echo "::error::Timed out waiting for sheaf-serve==${SHEAF_VERSION} on PyPI"
          exit 1

      - uses: docker/setup-buildx-action@v3

      # Login is only needed when we actually push.  Skipping on PR builds
      # avoids granting the PR runner GHCR write credentials it doesn't
      # need (defense in depth — fork PRs from the wider community could
      # otherwise see misuse paths).
      - name: Login to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # docker/metadata-action computes the right tag set per event:
      #   - tag push: vX.Y.Z, X.Y.Z, and `latest` (only on stable tags).
      #   - PR:       pr-{number}, used only for the local build artifact
      #               since push: false on PRs.
      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/sheaf-serve
          tags: |
            type=semver,pattern=v{{version}}
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.event_name == 'push' && !contains(github.ref, '-') }}
            type=ref,event=pr

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          # Only push on tag.  PRs build the image to validate the
          # Dockerfile but don't ship anything.
          push: ${{ github.event_name == 'push' }}
          platforms: linux/amd64
          build-args: |
            SHEAF_VERSION=${{ env.SHEAF_VERSION }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions cache speeds up rebuilds when only docs / minor
          # things change between tags.  Scope is per-ref so different tags
          # don't evict each other.
          cache-from: type=gha
          cache-to: type=gha,mode=max
