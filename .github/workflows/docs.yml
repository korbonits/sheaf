name: Docs build check

# Netlify owns the actual deploy of sheaf-serve.dev (build config in
# netlify.toml at repo root).  This workflow only runs `mkdocs build`
# as a PR-time gate so broken refs / mkdocstrings errors / missing
# pages fail CI before merge — Netlify's deploy preview is the
# rendered-site check, this is the build-doesn't-error check.
#
# Triggers:
#   - pull_request that touches docs/, mkdocs.yml, src/, or pyproject.toml
#   - workflow_dispatch for manual fire
#   - push to main: sanity check that whatever just merged still builds
on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "src/**"
      - ".github/workflows/docs.yml"
      - "pyproject.toml"
  pull_request:
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "src/**"
      - ".github/workflows/docs.yml"
      - "pyproject.toml"
      - "netlify.toml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install
        run: uv sync --extra docs

      - name: Build (strict)
        # --strict turns mkdocstrings warnings (broken refs, malformed
        # docstring sections, missing modules) into errors so we catch
        # documentation drift on PR rather than after merge.  Re-enabled
        # after the Args: → Attributes: cleanup across sheaf.api.* +
        # sheaf.cache + sheaf.lora + sheaf.client (Pydantic BaseModel
        # docstrings can't use Args: because BaseModel.__init__ takes
        # **kwargs, and griffe correctly flags the signature mismatch).
        run: uv run mkdocs build --strict
