name: Docs build check

# Netlify owns the actual deploy of sheaf-serve.dev (build config in
# netlify.toml at repo root).  This workflow only runs `mkdocs build`
# as a PR-time gate so broken refs / mkdocstrings errors / missing
# pages fail CI before merge — Netlify's deploy preview is the
# rendered-site check, this is the build-doesn't-error check.
#
# Triggers:
#   - pull_request that touches docs/, mkdocs.yml, src/, or pyproject.toml
#   - workflow_dispatch for manual fire
#   - push to main: sanity check that whatever just merged still builds
on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "src/**"
      - ".github/workflows/docs.yml"
      - "pyproject.toml"
  pull_request:
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "src/**"
      - ".github/workflows/docs.yml"
      - "pyproject.toml"
      - "netlify.toml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install
        run: uv sync --extra docs

      - name: Build
        # Plain build (not --strict) for now: BaseModel docstrings use
        # ``Args:`` to describe Pydantic fields, which griffe flags as
        # signature mismatches because BaseModel's ``__init__`` accepts
        # ``**kwargs`` rather than the listed names.  The warnings are
        # cosmetic (the API ref still renders fields via Pydantic's
        # schema), but ``--strict`` fails on them.  Tracked as
        # cleanup: convert Args: → Attributes: across sheaf.api.*
        # before re-enabling strict mode.
        run: uv run mkdocs build
